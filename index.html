<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in | Snapchat</title>
  <link rel="stylesheet" href="style2.css" />
</head>
<body>

  <!-- First Screen: Username -->
  <div id="screen1" class="screen active">
    <div class="snapchat-container">
      <button class="open-snapchat">
        👻 Open Snapchat
      </button>

      <div class="login-card">
        <div class="logo">👻</div>
        <h1>Log in to Snapchat</h1>

        <div class="input-group">
          <label>Username or email</label>
          <input type="text" id="username" placeholder="" autofocus />
        </div>

        <a href="#" class="phone-link">Use a phone number instead</a>

        <button class="next-btn" onclick="goToPassword()">Next</button>

        <div class="divider">
          <span>or</span>
        </div>

        <button class="google-btn">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/2048px-Google_%22G%22_logo.svg.png" alt="G"/>
          Continue with Google
        </button>

        <div class="signup">
          Using Snapchat for the first time? <a href="#">Sign up</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Second Screen: Password -->
  <div id="screen2" class="screen">
    <div class="snapchat-container">
      <button class="open-snapchat">
        👻 Open Snapchat
      </button>

      <div class="login-card">
        <div class="logo">👻</div>
        <h1>Enter Password</h1>

        <div class="username-row">
          <span class="displayusername"></span>
          <a href="#" onclick="goToUsername()" class="not-you">Not you?</a>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder=""/>
            <span class="toggle-eye" onclick="togglePassword()">👁️</span>
          </div>
        </div>

        <a href="#" class="forgot">Forgot Password</a>

        <button class="next-btn" onclick="alert('Logged in! (Demo)')">Next</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
